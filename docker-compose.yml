version: '3.8'
services:
  code-review:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - /path/to/your/projects:/projects:ro
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
