<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码审查智能体</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9;
  --text-muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --purple: #bc8cff;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: 1fr 350px; gap: 24px; }
.container.main-layout { grid-template-columns: 1fr; }

h1 { font-size: 28px; margin-bottom: 8px; color: #f0f6fc; }
.subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
.input-group { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.input-group input[type="text"] {
  flex: 1; min-width: 300px; padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  font-size: 14px; outline: none;
}
.input-group input[type="text"]:focus { border-color: var(--accent); }
select {
  padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 14px; cursor: pointer; outline: none;
}
select:focus { border-color: var(--accent); }
button {
  padding: 10px 24px; background: #238636; color: #fff; border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
}
button:hover { background: #2ea043; }
button:disabled { background: #21262d; color: var(--text-muted); cursor: not-allowed; }
.progress { display: none; margin: 20px 0; }
.progress-bar { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s; }
.progress-text { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
.error-msg { color: var(--red); margin: 16px 0; font-size: 14px; display: none; }

/* LLM Status */
.llm-status {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; margin-bottom: 16px;
}
.llm-status.available { border-color: var(--green); }
.llm-status.unavailable { border-color: var(--yellow); }
.llm-status .status-dot { width: 8px; height: 8px; border-radius: 50%; }
.llm-status.available .status-dot { background: var(--green); }
.llm-status.unavailable .status-dot { background: var(--yellow); }
.llm-status .model-name { color: var(--text-muted); }

/* Main Content */
.main-content { }
.results { display: none; margin-top: 32px; }
.score-section { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; align-items: flex-start; }
.score-circle {
  width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; border: 4px solid var(--border);
  flex-shrink: 0;
}
.score-number { font-size: 42px; font-weight: 700; }
.score-label { font-size: 13px; color: var(--text-muted); }
.summary-cards { display: flex; gap: 12px; flex-wrap: wrap; flex: 1; }
.summary-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; min-width: 120px;
}
.summary-card .label { font-size: 12px; color: var(--text-muted); }
.summary-card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }

/* AI Summary */
.ai-summary {
  background: linear-gradient(135deg, #1c2333 0%, #161b22 100%);
  border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 32px;
  display: none;
}
.ai-summary.active { display: block; }
.ai-summary-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  font-size: 16px; font-weight: 600; color: var(--accent);
}
.ai-summary-content {
  font-size: 14px; line-height: 1.8; color: var(--text);
}
.ai-summary-content.typing::after {
  content: '▋'; animation: blink 1s infinite;
}
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

.dimensions { margin-bottom: 32px; }
.dim-item { margin-bottom: 16px; }
.dim-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
.dim-name { font-weight: 600; }
.dim-score { color: var(--text-muted); }
.dim-bar { height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
.dim-details { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.issues-section h2 { font-size: 20px; margin-bottom: 16px; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text-muted); font-size: 13px; cursor: pointer;
}
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.issue-list { list-style: none; }
.issue-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; margin-bottom: 10px; transition: border-color .2s;
}
.issue-item:hover { border-color: var(--text-muted); }
.issue-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 14px; }
.issue-file { color: var(--accent); font-family: 'SF Mono', Consolas, monospace; font-size: 13px; }
.issue-desc { font-size: 14px; margin-bottom: 4px; }
.issue-suggestion { font-size: 13px; color: var(--text-muted); }
.issue-metric { font-size: 12px; color: var(--purple); margin-top: 4px; font-family: monospace; }
.issue-explain-btn {
  padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text-muted); font-size: 12px; cursor: pointer;
  margin-top: 8px; transition: all .2s;
}
.issue-explain-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
.issue-explain-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.issue-explanation {
  margin-top: 12px; padding: 12px; background: rgba(88, 166, 255, 0.1);
  border: 1px solid rgba(88, 166, 255, 0.2); border-radius: 6px;
  font-size: 13px; line-height: 1.6; color: var(--text); display: none;
}
.issue-explanation.active { display: block; }
.issue-explanation pre {
  margin-top: 8px; padding: 10px; background: rgba(0, 0, 0, 0.3);
  border-radius: 4px; overflow-x: auto; font-size: 12px;
}

.no-issues { color: var(--text-muted); text-align: center; padding: 40px; font-size: 15px; }

/* Tools Status */
#toolsStatus {
  margin-top: 24px; padding: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; display: none;
}
#toolsStatus h3 { font-size: 15px; margin-bottom: 10px; color: var(--text-muted); }

/* Chat Panel */
.chat-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  display: flex; flex-direction: column; height: calc(100vh - 80px);
  position: sticky; top: 40px;
}
.chat-panel.collapsed { height: auto; }
.chat-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.chat-header h3 { font-size: 15px; display: flex; align-items: center; gap: 8px; }
.chat-toggle {
  background: none; border: none; color: var(--text-muted);
  padding: 4px; font-size: 18px; cursor: pointer;
}
.chat-toggle:hover { color: var(--text); }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
}
.chat-message {
  padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6;
}
.chat-message.user { background: rgba(88, 166, 255, 0.1); align-self: flex-end; max-width: 90%; }
.chat-message.assistant { background: var(--border); align-self: flex-start; max-width: 90%; }
.chat-message.system { color: var(--text-muted); font-style: italic; text-align: center; }
.chat-input-area {
  padding: 14px; border-top: 1px solid var(--border);
}
.chat-input-area textarea {
  width: 100%; min-height: 60px; max-height: 200px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 10px; font-size: 13px; resize: vertical;
  outline: none; font-family: inherit;
}
.chat-input-area textarea:focus { border-color: var(--accent); }
.chat-input-area .btn-row { display: flex; gap: 8px; margin-top: 8px; }
.chat-send { flex: 1; }
.chat-clear {
  padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 13px;
}
.chat-clear:hover { background: var(--border); }
.chat-llm-disabled {
  padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px;
}

/* Responsive */
@media (max-width: 900px) {
  .container { grid-template-columns: 1fr; }
  .chat-panel { height: 500px; }
}
@media (max-width: 600px) {
  .score-section { flex-direction: column; align-items: center; }
  .input-group { flex-direction: column; }
  .input-group input[type="text"] { min-width: unset; }
}
</style>
</head>
<body>
<div class="container" id="mainContainer">
  <div class="main-content">
    <h1>🔍 代码审查智能体</h1>
    <p class="subtitle">基于静态分析的多语言代码质量检测工具，支持 Python / JavaScript / Java / Go</p>

    <div class="tab-nav" style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);">
      <button class="tab-btn active" onclick="switchTab('analysis')" id="tabAnalysis" style="padding:10px 20px;background:none;border:none;border-bottom:2px solid var(--accent);color:var(--text);font-size:14px;cursor:pointer;">🔍 代码审查</button>
      <button class="tab-btn" onclick="switchTab('history')" id="tabHistory" style="padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-size:14px;cursor:pointer;">📈 历史趋势</button>
    </div>

    <div id="panelAnalysis">
    <!-- LLM Status -->
    <div class="llm-status" id="llmStatus">
      <span class="status-dot"></span>
      <span id="llmStatusText">检测 LLM 状态...</span>
      <span class="model-name" id="llmModelName"></span>
    </div>

    <div class="input-group">
      <input type="text" id="projectPath" placeholder="输入项目目录路径，或点击 📂 浏览" />
      <button onclick="openFolderPicker()" title="浏览本地目录" style="padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:16px;">📂</button>
      <select id="language">
        <option value="python">Python</option>
        <option value="javascript">JavaScript / TypeScript</option>
        <option value="java">Java</option>
        <option value="go">Go</option>
      </select>
      <select id="analysisMode" onchange="onModeChange()" style="padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;cursor:pointer;">
        <option value="full">📊 全量分析</option>
        <option value="diff">🔀 最近提交 (Diff)</option>
        <option value="diff-custom">🔀 自定义对比</option>
      </select>
      <button id="analyzeBtn" onclick="startAnalysis()">开始审查</button>
    </div>

    <!-- Diff 参数行（自定义对比时显示） -->
    <div id="diffParams" style="display:none;padding:4px 0 12px;gap:8px;align-items:center;">
      <span style="font-size:13px;color:var(--text-secondary);">对比范围：</span>
      <input type="text" id="diffBase" placeholder="基准 (如 HEAD~3 或 main)" style="padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;width:160px;" value="HEAD~1" />
      <span style="color:var(--text-secondary);">→</span>
      <input type="text" id="diffHead" placeholder="目标 (如 HEAD 或 dev)" style="padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;width:160px;" value="HEAD" />
      <span style="font-size:12px;color:var(--text-secondary);margin-left:4px;">仅分析两次提交之间变更的文件</span>
    </div>

    <!-- 目录浏览弹窗 -->
    <div id="folderModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
          <span style="font-size:16px;font-weight:600;">📂 选择项目目录</span>
          <div style="flex:1"></div>
          <button onclick="closeFolderPicker()" style="background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;">✕</button>
        </div>
        <div style="padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;">
            <button onclick="browseGoUp()" style="padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-size:13px;">⬆ 上级</button>
            <input type="text" id="browsePathInput" style="flex:1;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;" placeholder="路径" onkeydown="if(event.key==='Enter')browseGoTo(this.value)" />
            <button onclick="browseGoTo(document.getElementById('browsePathInput').value)" style="padding:4px 10px;background:var(--primary);border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:13px;">前往</button>
          </div>
        </div>
        <div id="folderList" style="flex:1;overflow-y:auto;padding:8px 12px;min-height:300px;">
          <div style="text-align:center;padding:40px;color:var(--text-secondary);">加载中...</div>
        </div>
        <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;">
          <span id="browseCurrentPath" style="flex:1;font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
          <button onclick="selectCurrentFolder()" style="padding:8px 20px;background:var(--primary);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:14px;font-weight:500;">选择此目录</button>
        </div>
      </div>
    </div>

    <script>
    let browseCurrentDir = '';

    function openFolderPicker() {
      const modal = document.getElementById('folderModal');
      modal.style.display = 'flex';
      const currentVal = document.getElementById('projectPath').value.trim();
      browseLoadDir(currentVal || '');
    }

    function closeFolderPicker() {
      document.getElementById('folderModal').style.display = 'none';
    }

    async function browseLoadDir(path) {
      const listEl = document.getElementById('folderList');
      const pathInput = document.getElementById('browsePathInput');
      const currentPathEl = document.getElementById('browseCurrentPath');
      listEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">加载中...</div>';

      try {
        const resp = await fetch('/api/browse?path=' + encodeURIComponent(path));
        const data = await resp.json();
        if (data.error) { listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;">' + data.error + '</div>'; return; }

        browseCurrentDir = data.current_path;
        pathInput.value = browseCurrentDir;
        currentPathEl.textContent = browseCurrentDir;

        let html = '';
        if (data.parent_path !== null) {
          html += '<div onclick="browseLoadDir(\'' + escapeJs(data.parent_path) + '\')" style="padding:8px 12px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;color:var(--text-secondary);" onmouseover="this.style.background=\'var(--hover)\'" onmouseout="this.style.background=\'transparent\'">📁 ..</div>';
        }
        for (const entry of data.entries) {
          if (entry.is_dir) {
            html += '<div onclick="browseLoadDir(\'' + escapeJs(entry.path) + '\')" style="padding:8px 12px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;" onmouseover="this.style.background=\'var(--hover)\'" onmouseout="this.style.background=\'transparent\'">📁 ' + escapeHtml(entry.name) + '</div>';
          }
        }
        for (const entry of data.entries) {
          if (!entry.is_dir) {
            html += '<div style="padding:8px 12px;border-radius:6px;display:flex;align-items:center;gap:8px;color:var(--text-secondary);opacity:0.5;">📄 ' + escapeHtml(entry.name) + '</div>';
          }
        }
        listEl.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--text-secondary);">空目录</div>';
      } catch (e) {
        listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;">加载失败: ' + e.message + '</div>';
      }
    }

    function browseGoUp() {
      const pathInput = document.getElementById('browsePathInput');
      const parentDir = pathInput.value.split('/').slice(0, -1).join('/') || '/';
      browseLoadDir(parentDir);
    }

    function browseGoTo(path) {
      if (path) browseLoadDir(path);
    }

    function selectCurrentFolder() {
      document.getElementById('projectPath').value = browseCurrentDir;
      closeFolderPicker();
    }

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escapeJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    function onModeChange() {
      const mode = document.getElementById('analysisMode').value;
      document.getElementById('diffParams').style.display = (mode === 'diff-custom') ? 'flex' : 'none';
    }

    function getAnalysisPayload(path, lang) {
      const mode = document.getElementById('analysisMode').value;
      const payload = { path, language: lang };
      if (mode === 'diff') {
        payload.mode = 'diff';
        payload.base = 'HEAD~1';
        payload.head = 'HEAD';
      } else if (mode === 'diff-custom') {
        payload.mode = 'diff';
        payload.base = document.getElementById('diffBase').value.trim() || 'HEAD~1';
        payload.head = document.getElementById('diffHead').value.trim() || 'HEAD';
      }
      return payload;
    }
    </script>

    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">准备分析...</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="results" id="results">
      <div class="score-section">
        <div class="score-circle" id="scoreCircle">
          <span class="score-number" id="totalScore">--</span>
          <span class="score-label">总体评分</span>
        </div>
        <div class="summary-cards" id="summaryCards"></div>
      </div>

      <!-- AI Summary -->
      <div class="ai-summary" id="aiSummary">
        <div class="ai-summary-header">
          <span>🤖 AI 总体评价</span>
        </div>
        <div class="ai-summary-content" id="aiSummaryContent"></div>
      </div>

      <div class="dimensions" id="dimensionsSection">
        <h2 style="font-size:20px;margin-bottom:16px;">📊 各维度评分</h2>
        <div id="dimensionBars"></div>
      </div>

      <div class="issues-section">
        <h2>📋 问题列表</h2>
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all" onclick="filterIssues('all', this)">全部</button>
          <button class="filter-btn" data-filter="critical" onclick="filterIssues('critical', this)">🔴 严重</button>
          <button class="filter-btn" data-filter="warning" onclick="filterIssues('warning', this)">🟡 警告</button>
          <button class="filter-btn" data-filter="info" onclick="filterIssues('info', this)">🔵 建议</button>
        </div>
        <ul class="issue-list" id="issueList"></ul>
      </div>

      <div id="toolsStatus" style="margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:none;">
        <h3 style="font-size:15px;margin-bottom:10px;color:var(--text-muted);">🔧 分析引擎</h3>
        <div id="toolsStatusContent"></div>
      </div>

      <div style="margin-top:20px;display:flex;gap:12px;" id="exportButtons" style="display:none;">
        <button onclick="exportReport('markdown')" style="background:#21262d;border:1px solid var(--border);">📄 导出 Markdown</button>
        <button onclick="exportReport('html')" style="background:#21262d;border:1px solid var(--border);">🌐 导出 HTML</button>
      </div>
    </div>
    </div>

    <div id="panelHistory" style="display:none;">
      <h2 style="font-size:20px;margin-bottom:16px;">📈 历史趋势</h2>
      <div style="display:flex;gap:12px;margin-bottom:20px;">
        <input type="text" id="historyProjectFilter" placeholder="按项目路径筛选" style="flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none;" />
        <button onclick="loadHistory()" style="padding:10px 20px;">加载</button>
      </div>
      <div style="position:relative;height:400px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;">
        <canvas id="trendChart"></canvas>
      </div>
      <div id="historyTable" style="margin-top:20px;"></div>
    </div>
  </div>

  <!-- Chat Panel -->
  <aside class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <h3>💬 AI 对话助手</h3>
      <button class="chat-toggle" onclick="toggleChat()">−</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-message system">你好！我是代码审查助手，有什么可以帮你的吗？</div>
    </div>
    <div class="chat-input-area" id="chatInputArea">
      <textarea id="chatInput" placeholder="基于分析结果提问..."></textarea>
      <div class="btn-row">
        <button class="chat-send" onclick="sendChatMessage()">发送</button>
        <button class="chat-clear" onclick="clearChat()">清空</button>
      </div>
    </div>
    <div class="chat-llm-disabled" id="chatLlmDisabled" style="display:none;">
      LLM 服务未配置，对话功能不可用。
    </div>
  </aside>
</div>

<script>
let allIssues = [];
let currentAnalysisResult = null;
let llmAvailable = false;
let chatHistory = [];
let chatPanelExpanded = true;

// Check LLM status on load
async function checkLlmStatus() {
  try {
    const res = await fetch('/api/llm/status');
    const data = await res.json();
    llmAvailable = data.available;
    const statusEl = document.getElementById('llmStatus');
    const statusText = document.getElementById('llmStatusText');
    const modelName = document.getElementById('llmModelName');

    if (data.available) {
      statusEl.classList.add('available');
      statusEl.classList.remove('unavailable');
      statusText.textContent = '🤖 LLM 已连接';
      modelName.textContent = `${data.provider} · ${data.model}`;

      document.getElementById('chatInputArea').style.display = 'block';
      document.getElementById('chatLlmDisabled').style.display = 'none';
    } else {
      statusEl.classList.add('unavailable');
      statusEl.classList.remove('available');
      statusText.textContent = '⚠️ LLM 未配置';
      modelName.textContent = '';

      document.getElementById('chatInputArea').style.display = 'none';
      document.getElementById('chatLlmDisabled').style.display = 'block';
    }
  } catch (e) {
    console.error('Failed to check LLM status:', e);
  }
}

function startAnalysis() {
  const path = document.getElementById('projectPath').value.trim();
  const lang = document.getElementById('language').value;
  const btn = document.getElementById('analyzeBtn');
  const progress = document.getElementById('progress');
  const errorMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');
  const aiSummary = document.getElementById('aiSummary');

  if (!path) { alert('请输入项目目录路径'); return; }

  btn.disabled = true;
  btn.textContent = '分析中...';
  progress.style.display = 'block';
  errorMsg.style.display = 'none';
  results.style.display = 'none';
  aiSummary.style.display = 'none';

  // Simulate progress
  let pct = 0;
  const steps = ['检测分析工具...', '扫描文件...', '分析代码复杂度...', '检测代码重复...', '检查命名规范...', '分析注释覆盖率...', '检测安全隐患...', '生成报告...'];
  let stepIdx = 0;
  const timer = setInterval(() => {
    pct = Math.min(pct + Math.random() * 15, 90);
    stepIdx = Math.min(Math.floor(pct / 15), steps.length - 1);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = steps[stepIdx];
  }, 300);

  fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(getAnalysisPayload(path, lang))
  })
  .then(r => r.json())
  .then(data => {
    clearInterval(timer);
    if (data.error) {
      errorMsg.textContent = data.error;
      errorMsg.style.display = 'block';
      progress.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '开始审查';
      return;
    }
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressText').textContent = '分析完成！';

    // Store result for chat
    currentAnalysisResult = data;

    // If LLM is available, get enhanced analysis
    if (llmAvailable) {
      document.getElementById('progressText').textContent = '正在生成 AI 评价...';
      fetch('/api/analyze/enhanced', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getAnalysisPayload(path, lang))
      })
      .then(r => r.json())
      .then(enhancedData => {
        if (!enhancedData.error && enhancedData.llm_summary) {
          typewriterEffect(enhancedData.llm_summary);
        }
        currentAnalysisResult = enhancedData;
        setTimeout(() => {
          progress.style.display = 'none';
          btn.disabled = false;
          btn.textContent = '开始审查';
          renderResults(enhancedData);
        }, 500);
      })
      .catch(() => {
        // Fallback to basic results
        setTimeout(() => {
          progress.style.display = 'none';
          btn.disabled = false;
          btn.textContent = '开始审查';
          renderResults(data);
        }, 500);
      });
    } else {
      setTimeout(() => {
        progress.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '开始审查';
        renderResults(data);
      }, 500);
    }
  })
  .catch(err => {
    clearInterval(timer);
    errorMsg.textContent = '请求失败: ' + err.message;
    errorMsg.style.display = 'block';
    progress.style.display = 'none';
    btn.disabled = false;
    btn.textContent = '开始审查';
  });
}

function typewriterEffect(text) {
  const aiSummary = document.getElementById('aiSummary');
  const content = document.getElementById('aiSummaryContent');
  aiSummary.style.display = 'block';
  content.textContent = '';
  content.classList.add('typing');

  let i = 0;
  const speed = 10; // ms per character

  function type() {
    if (i < text.length) {
      content.textContent += text.charAt(i);
      i++;
      setTimeout(type, speed);
    } else {
      content.classList.remove('typing');
    }
  }

  type();
}

function scoreColor(score) {
  if (score >= 80) return '#3fb950';
  if (score >= 60) return '#d29922';
  return '#f85149';
}

function renderResults(data) {
  document.getElementById('results').style.display = 'block';
  const score = data.total_score;
  const color = scoreColor(score);

  document.getElementById('totalScore').textContent = score;
  document.getElementById('scoreCircle').style.borderColor = color;
  document.getElementById('totalScore').style.color = color;

  // Summary cards
  const criticals = data.all_issues.filter(i => i.severity === 'critical').length;
  const warnings = data.all_issues.filter(i => i.severity === 'warning').length;
  const infos = data.all_issues.filter(i => i.severity === 'info').length;
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card"><div class="label">分析文件数</div><div class="value">${data.file_count}</div></div>
    <div class="summary-card"><div class="label">总代码行数</div><div class="value">${data.total_lines.toLocaleString()}</div></div>
    <div class="summary-card"><div class="label">🔴 严重</div><div class="value" style="color:${criticals?'var(--red)':'var(--green)'}">${criticals}</div></div>
    <div class="summary-card"><div class="label">🟡 警告</div><div class="value" style="color:${warnings?'var(--yellow)':'var(--green)'}">${warnings}</div></div>
    <div class="summary-card"><div class="label">🔵 建议</div><div class="value">${infos}</div></div>
  `;

  // Dimension bars
  const barsHtml = data.dimensions.map(d => {
    const c = scoreColor(d.score);
    return `<div class="dim-item">
      <div class="dim-header">
        <span class="dim-name">${d.name}</span>
        <span class="dim-score" style="color:${c}">${d.score} 分</span>
      </div>
      <div class="dim-bar"><div class="dim-fill" style="width:${d.score}%;background:${c}"></div></div>
      <div class="dim-details">${d.details} · ${d.issues.length} 个问题</div>
    </div>`;
  }).join('');
  document.getElementById('dimensionBars').innerHTML = barsHtml;

  // Issues
  allIssues = data.all_issues;
  renderIssues(allIssues);

  // Tools status
  renderToolsStatus(data.tools_status);
}

function renderIssues(issues) {
  const list = document.getElementById('issueList');
  if (!issues.length) {
    list.innerHTML = '<div class="no-issues">✅ 没有发现该级别的问题</div>';
    return;
  }

  list.innerHTML = issues.map((i, idx) => `
    <li class="issue-item" data-severity="${i.severity}">
      <div class="issue-header">
        <span>${i.icon}</span>
        <span class="issue-file">${i.file}${i.line ? ':' + i.line : ''}</span>
      </div>
      <div class="issue-desc">${i.description}</div>
      ${i.suggestion ? `<div class="issue-suggestion">💡 ${i.suggestion}</div>` : ''}
      ${i.metric ? `<div class="issue-metric">${i.metric}</div>` : ''}
      <button class="issue-explain-btn" onclick="explainIssue('${i.file}', ${i.line}, '${i.description.replace(/'/g, "\\'")}', ${idx})" ${!llmAvailable ? 'disabled' : ''}>🤖 AI 解释</button>
      <div class="issue-explanation" id="explanation-${idx}"></div>
    </li>
  `).join('');
}

function explainIssue(file, line, description, idx) {
  const explanationEl = document.getElementById(`explanation-${idx}`);
  explanationEl.style.display = 'block';
  explanationEl.innerHTML = '<span style="color:var(--text-muted)">正在生成解释...</span>';

  fetch('/api/issue/explain', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      file_path: file,
      line: line,
      description: description,
      language: document.getElementById('language').value
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      explanationEl.innerHTML = `<span style="color:var(--red)">错误: ${data.error}</span>`;
    } else {
      explanationEl.innerHTML = data.explanation;
      if (data.code_context) {
        explanationEl.innerHTML += `<pre><code>${escapeHtml(data.code_context)}</code></pre>`;
      }
    }
  })
  .catch(err => {
    explanationEl.innerHTML = `<span style="color:var(--red)">请求失败: ${err.message}</span>`;
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function filterIssues(severity, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (severity === 'all') {
    renderIssues(allIssues);
  } else {
    renderIssues(allIssues.filter(i => i.severity === severity));
  }
}

function renderToolsStatus(tools_status) {
  const container = document.getElementById('toolsStatus');
  const content = document.getElementById('toolsStatusContent');
  if (!tools_status || Object.keys(tools_status).length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  const lines = [];
  if (tools_status.ruff) {
    const r = tools_status.ruff;
    lines.push(r.available
      ? `<span style="color:var(--green)">🐍 Ruff v${r.version || '?'}</span> <span style="color:var(--text-muted)">— 检测到 ${r.findings} 个问题</span>`
      : `<span style="color:var(--yellow)">⚠️ Ruff 未安装，使用 AST 降级分析</span>`
    );
  }
  if (tools_status.semgrep) {
    const s = tools_status.semgrep;
    lines.push(s.available
      ? `<span style="color:var(--green)">🛡️ Semgrep v${s.version || '?'}</span> <span style="color:var(--text-muted)">— 检测到 ${s.findings} 个安全问题</span>`
      : `<span style="color:var(--yellow)">⚠️ Semgrep 未安装，使用正则降级分析</span>`
    );
  }
  content.innerHTML = lines.join('<br>');
}

function toggleChat() {
  const panel = document.getElementById('chatPanel');
  const toggle = document.querySelector('.chat-toggle');
  chatPanelExpanded = !chatPanelExpanded;

  if (chatPanelExpanded) {
    panel.classList.remove('collapsed');
    panel.style.height = 'calc(100vh - 80px)';
    toggle.textContent = '−';
  } else {
    panel.classList.add('collapsed');
    panel.style.height = 'auto';
    toggle.textContent = '+';
  }
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  if (!currentAnalysisResult) {
    alert('请先进行代码分析');
    return;
  }

  if (!llmAvailable) {
    alert('LLM 服务未配置');
    return;
  }

  // Add user message
  addChatMessage('user', message);
  input.value = '';

  // Analysis context
  const analysisContext = {
    language: currentAnalysisResult.language,
    total_score: currentAnalysisResult.total_score,
    file_count: currentAnalysisResult.file_count
  };

  // Send to LLM
  const chatContainer = document.getElementById('chatMessages');

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: message,
      analysis_context: analysisContext,
      history: chatHistory,
      stream: true
    })
  })
  .then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let assistantMsg = '';
    let assistantMsgEl = addChatMessage('assistant', '');
    assistantMsgEl.textContent = '';

    function readStream() {
      reader.read().then(({ done, value }) => {
        if (done) {
          chatHistory.push({ question: message, answer: assistantMsg });
          return;
        }

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.text) {
                assistantMsg += data.text;
                assistantMsgEl.textContent = assistantMsg;
                chatContainer.scrollTop = chatContainer.scrollHeight;
              } else if (data.done) {
                chatHistory.push({ question: message, answer: assistantMsg });
                return;
              } else if (data.error) {
                assistantMsgEl.textContent = `错误: ${data.error}`;
              }
            } catch (e) {
              // Ignore parse errors
            }
          }
        }

        readStream();
      });
    }

    readStream();
  })
  .catch(err => {
    addChatMessage('assistant', `请求失败: ${err.message}`);
  });
}

function addChatMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = `chat-message ${role}`;
  msg.textContent = content;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  return msg;
}

function clearChat() {
  document.getElementById('chatMessages').innerHTML =
    '<div class="chat-message system">对话已清空，有什么可以帮你的吗？</div>';
  chatHistory = [];
}

// History & Export functions
let trendChart = null;
let currentAnalysisId = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.style.borderBottomColor = 'transparent';
    b.style.color = 'var(--text-muted)';
    b.classList.remove('active');
  });
  document.getElementById('panelAnalysis').style.display = tab === 'analysis' ? '' : 'none';
  document.getElementById('panelHistory').style.display = tab === 'history' ? '' : 'none';
  const btn = tab === 'analysis' ? document.getElementById('tabAnalysis') : document.getElementById('tabHistory');
  btn.style.borderBottomColor = 'var(--accent)';
  btn.style.color = 'var(--text)';
  btn.classList.add('active');
  if (tab === 'history') loadHistory();
}

async function loadHistory() {
  const filter = document.getElementById('historyProjectFilter').value.trim();
  const params = new URLSearchParams({limit: '50'});
  if (filter) params.set('project_path', filter);
  
  try {
    const res = await fetch('/api/history?' + params);
    const data = await res.json();
    renderTrendChart(data);
    renderHistoryTable(data);
  } catch (e) {
    document.getElementById('historyTable').innerHTML = '<p style="color:var(--red)">加载失败: ' + e.message + '</p>';
  }
}

function renderTrendChart(records) {
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (trendChart) trendChart.destroy();
  
  records = records.reverse();
  const labels = records.map(r => (r.created_at || '').substring(0, 10));
  const scores = records.map(r => r.total_score);
  
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '总分',
        data: scores,
        borderColor: '#58a6ff',
        backgroundColor: 'rgba(88,166,255,0.1)',
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, max: 100, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
      },
      plugins: {
        legend: { labels: { color: '#c9d1d9' } }
      }
    }
  });
}

function renderHistoryTable(records) {
  if (!records.length) {
    document.getElementById('historyTable').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">暂无分析历史</p>';
    return;
  }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  html += '<tr style="border-bottom:1px solid var(--border);"><th style="padding:8px;text-align:left;color:var(--text-muted)">ID</th><th style="padding:8px;text-align:left;color:var(--text-muted)">分数</th><th style="padding:8px;text-align:left;color:var(--text-muted)">语言</th><th style="padding:8px;text-align:left;color:var(--text-muted)">文件</th><th style="padding:8px;text-align:left;color:var(--text-muted)">时间</th><th style="padding:8px;text-align:left;color:var(--text-muted)">操作</th></tr>';
  for (const r of records) {
    const color = r.total_score >= 80 ? 'var(--green)' : r.total_score >= 60 ? 'var(--yellow)' : 'var(--red)';
    html += `<tr style="border-bottom:1px solid var(--border);"><td style="padding:8px">${r.id}</td><td style="padding:8px;color:${color}">${r.total_score.toFixed(1)}</td><td style="padding:8px">${r.language}</td><td style="padding:8px">${r.file_count}</td><td style="padding:8px;color:var(--text-muted)">${(r.created_at||'').substring(0,16)}</td><td style="padding:8px"><a href="#" onclick="viewAnalysis(${r.id});return false;" style="color:var(--accent)">查看</a> | <a href="/api/export/${r.id}?format=markdown" style="color:var(--accent)">导出</a></td></tr>`;
  }
  html += '</table>';
  document.getElementById('historyTable').innerHTML = html;
}

async function viewAnalysis(id) {
  const res = await fetch('/api/history/' + id);
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  currentAnalysisId = id;
  // Switch to analysis tab and show the result
  switchTab('analysis');
  // Convert stored format back to display format
  const displayData = {
    total_score: data.total_score,
    file_count: data.file_count,
    total_lines: data.total_lines,
    language: data.language,
    dimensions: (data.dimensions || []).map(d => ({
      name: d.name, score: d.score || d.score, weight: d.weight,
      details: d.details || '', issues: d.issues || []
    })),
    all_issues: (data.dimensions || []).flatMap(d => (d.issues || []).map(i => ({
      ...i, icon: {'critical':'🔴','warning':'🟡','info':'🔵'}[i.severity]||'⚪'
    }))),
    tools_status: {},
  };
  renderResults(displayData);
  document.getElementById('exportButtons').style.display = 'flex';
}

function exportReport(format) {
  if (currentAnalysisId) {
    window.open('/api/export/' + currentAnalysisId + '?format=' + format, '_blank');
  } else {
    alert('请先查看历史记录再导出');
  }
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
  checkLlmStatus();
});
</script>
</body>
</html>
